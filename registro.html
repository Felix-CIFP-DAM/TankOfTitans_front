<div class="app-registro">
    <div class="registro-contenedor">
        <form class="registro-formulario">
            <h2>Registrate</h2>
            <div class="input-group">
                <label for="Usuario">Nombre de Usuario</label>
                <input type="Usuario" placeholder="Escribe el nombre de usuario que vas a utilizar">
            </div>
            <div class="input-group">
                <label for="Email">email</label>
                <input type="Usuario" placeholder="Escribe tu email">
            </div>
            <div class="input-group">
                <label for="Contraseña">Contraseña</label>
                <input type="Usuario" placeholder="Escribe Contraseña (-Minimo de 8 caracteres -Maximo 12 caracteres -Minimo una mayuscula -Minimo una minuscula - Minimo un caracter especial (Ejem:+,%,@))">
            </div>
            <div class="input-group">
                <label for="RepContraseña">Repetir Contraseña</label>
                <input type="Usuario" placeholder="Por favor, repita la contraseña">
            </div>
            <button type="submit" class="register-button">      
                Enviar 
            </button>
        </form>

    </div>

</div>
