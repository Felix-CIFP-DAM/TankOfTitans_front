<div class="panel-principal">
    <!-- Animated background particles -->
    <div class="bg-particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- Top Section: Title + Profile -->
    <header class="panel-header">
        <div class="game-title-container">
            <p
                style="color: var(--military-gold); font-size: 10px; margin: 0; font-family: 'Courier New', Courier, monospace; letter-spacing: 2px;">
                IDENTIFICATION REQUIRED // LEVEL 5</p>
            <h1 class="game-title">Tank Of Titans</h1>
            <div class="title-underline"></div>
        </div>
        <div class="game-logo-container">
            <img src="logo_oficial.png" alt="">
        </div>
        <div class="perfil-container" id="perfil-btn">
            <p
                style="color: var(--military-gold); font-size: 9px; margin-bottom: 5px; font-family: 'Courier New', Courier, monospace; text-align: right;">
                OPERATOR STATUS: {{status}}</p>
            <div class="perfil-circle">
                <span class="perfil-icon"><img [src]="perfil_imagen" class="icono-boton" /></span>
            </div>
            <span class="perfil-label">Perfil</span>
        </div>
    </header>

    <!-- Menu Buttons -->
    <nav class="menu-buttons">
        <button class="menu-btn" id="host-game-btn">
            <span class="btn-icon"><img src="play_icono.png" class="icono-boton" /></span>
            <span class="btn-text">Host Game</span>
            <span class="btn-arrow">→</span>
        </button>
        <button class="menu-btn" id="jugar-amigos-btn">
            <span class="btn-icon"><img src="amigos_icono.png" class="icono-boton" /></span>
            <span class="btn-text">Jugar con Amigos</span>
            <span class="btn-arrow">→</span>
        </button>
        <button class="menu-btn" id="opciones-btn">
            <span class="btn-icon"><img src="settings_icono.png" class="icono-boton" /></span>
            <span class="btn-text">Opciones</span>
            <span class="btn-arrow">→</span>
        </button>
        <button class="menu-btn menu-btn-exit" id="exit-btn">
            <span class="btn-icon"><img src="exit_icono.png" class="icono-boton" /></span>
            <span class="btn-text">Exit</span>
            <span class="btn-arrow">→</span>
        </button>
    </nav>

    <!-- Store Button -->
    <div class="tienda-section">
        <button class="tienda-btn" id="tienda-btn">
            <span class="tienda-icon"><img src="market_icono.png" class="icono-boton" /></span>
            <span class="tienda-text">TIENDA</span>
            <span class="tienda-chevron">❯</span>
        </button>
    </div>
</div>
