<div class="app-registro">
    <div class="registro-contenedor">
        <form class="registro-formulario">
            <h2>Registrate</h2>
            <div class="input-group">
                <label for="Usuario">Nombre de Usuario</label>
                <input type="Usuario" placeholder="Escribe el nombre de usuario que vas a utilizar">
            </div>
            <div class="input-group">
                <label for="Email">Email</label>
                <input type="email" name="Email" placeholder="Escribe tu email">
            </div>
            <div class="input-group">
                <label for="Contraseña">Contraseña</label>
                <input type="password" name="Contraseña" placeholder="Escribe Contraseña (-Minimo de 8 caracteres -Maximo 12 caracteres -Minimo una mayuscula -Minimo una minuscula - Minimo un caracter especial (Ejem:+,%,@))">
            </div>
            <div class="input-group">
                <label for="RepContraseña">Repetir Contraseña</label>
                <input type="password" name="RepContraseña" placeholder="Repita la contraseña">
            </div>
            <div class="enlaces elemento-formulario">
                <p>
                    <a routerLink="/sesion">¿Ya estas registrado? Haz Login</a>
                </p>
            </div>
            <button type="submit" class="registro-button">      
                Enviar 
            </button>
        </form>

    </div>

</div>
