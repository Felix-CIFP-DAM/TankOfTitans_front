<div class="app-sesion">
   <div class="cuadro cuadro-sesion">
        
        <form class="formulario form-sesion">
            <h2>Iniciar Sesión</h2>
            <div class="input-group">
                <label>Usuario</label>
                <input type="email" placeholder="Escribe tu nombre de usuario"/>
            </div>
            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" placeholder="Escribe tu contraseña"/>
            </div>
            <div class="enlaces elemento-formulario">
                <p>
                    <a routerLink="/registro">¿No estas registrado?</a>
                </p>
                <p>
                    <a routerLink="/recuperar-contra">Recupera tu contraseña</a>
                </p>
            </div>
            <div class="elemento-bajo">
                <button type="submit" class="boton-envio sesion-button">
                    Submit
                </button>
            </div>
        </form>
    </div>
</div>
