<div class="cuadro-sesion">
    <div class="titulo">
        <p>Iniciar Sesión</p>
    </div>
    <form class="formulario-sesion">
        <div class="elemento-formulario">
            <label>Usuario</label>
            <input type="email"/>
        </div>
        <div class="elemento-formulario">
            <label>Contraseña</label>
            <input type="password"/>
        </div>
        <div>
            <p>
                <a>¿No estas registrado?</a>
            </p>
            <p>
                <a>Recupera tu contraseña</a>
            </p>
        </div>
        <div class="elemento-bajo">
            <button type="submit" class="boton-envio">
                <mat-icon>speed</mat-icon>Submit
            </button>
        </div>
    </form>
</div>
