<div class="app-recuperar">
    <div class="cuadro cuadro-recuperar-pass">

        <form class="formulario form-recuperar">
            <h2>Recuperar Contraseña</h2>
            <div class="input-group">
                <p class="texto">Ingresa tu correo para recuperar la contraseña</p>
            </div>
            <div class="input-group">
                <label>Correo</label>
                <input type="email" placeholder="Inserta su correo"/>
            </div>
            <div class="enlaces elemento-formulario">
                <p>
                    <a routerLink="/sesion">Iniciar Sesión</a>
                </p>
            </div>
            <div class="elemento-bajo">
                <button type="submit" class="recuperar-button">
                    Enviar
                </button>
            </div>
        </form>
    </div>
</div>
