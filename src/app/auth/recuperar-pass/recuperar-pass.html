<div class="cuadro cuadro-recuperar-pass">
    <div class="titulo">
        <p>Recuperar Contraseña</p>
    </div>
    <form class="formulario form-recuperar">
        <div class="elemento-formulario">
            <p>Ingresa tu correo para recuperar la contraseña</p>
        </div>
        <div class="elemento-formulario">
            <label>Correo</label>
            <input type="email"/>
        </div>
        <div class="enlaces elemento-formulario">
            <p>
                <a routerLink="/sesion">Iniciar Sesión</a>
            </p>
        </div>
        <div class="elemento-bajo">
            <button type="submit" class="boton-envio">
                <mat-icon>speed</mat-icon>
            </button>
        </div>
    </form>
</div>
